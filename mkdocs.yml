site_name: metasurface-py
site_url: https://jman4162.github.io/metasurface-py/
repo_url: https://github.com/jman4162/metasurface-py
repo_name: jman4162/metasurface-py

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.sections
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Home: index.md
  - API Reference:
    - Core: api/core.md
    - Geometry: api/geometry.md
    - Elements: api/elements.md
    - Surfaces: api/surfaces.md
    - EM: api/em.md
    - Channels: api/channels.md
    - Optimize: api/optimize.md
    - Sensing: api/sensing.md
    - Plotting: api/plotting.md
    - Datasets: api/datasets.md
    - Experiments: api/experiments.md
    - Adapters: api/adapters.md
    - IO: api/io.md
    - Backends: api/backends.md
